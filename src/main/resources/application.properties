spring.application.name=ATM Simulator

# ── Host mode ──────────────────────────────────────────────────────────────────
# true  = use SimulatedHostGateway (no real host required, default for testing)
# false = use RealNdcHostGateway (live TCP connection to NCR host)
atm.host.simulated=true

# ── Real NCR host connection (only used when atm.host.simulated=false) ─────────
atm.host.address=localhost
atm.host.port=4000

# ── Terminal identity ──────────────────────────────────────────────────────────
# 8-digit terminal ID assigned by the host / acquirer
atm.terminal.id=00000001
# 4-digit institution / bank ID
atm.institution.id=0001
